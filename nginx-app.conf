server {
    listen 80;

    # Docker embedded DNS — enables lazy resolution via $variables so nginx
    # starts even when Alfresco is not part of the active compose profile.
    resolver 127.0.0.11 ipv6=off valid=30s;

    root  /usr/share/nginx/html;
    index index.html;

    set $rag_upstream       rag-service:9091;
    set $alfresco_upstream  alfresco:8080;

    # ---- API proxy -------------------------------------------------------

    # SSE chat stream: disable retry-on-error, extend timeout, no buffering
    location /api/rag/chat/stream {
        proxy_pass         http://$rag_upstream;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_pass_request_headers on;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/rag {
        proxy_pass         http://$rag_upstream;
        proxy_buffering    off;
        proxy_pass_request_headers on;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /alfresco/ {
        proxy_pass         http://$alfresco_upstream;
        proxy_pass_request_headers on;
        proxy_set_header   Host $host;
    }

    location = /nuxeo {
        return 301 /nuxeo/;
    }

    location /nuxeo/ {
        # Static upstream — avoids Docker DNS resolution failure on Linux
        # where host.docker.internal is set via /etc/hosts, not DNS.
        proxy_pass         http://host.docker.internal:8081;
        proxy_pass_request_headers on;
        proxy_set_header   Host $host;
    }

    # ---- Angular SPA -----------------------------------------------------

    # Never cache the app shell so URL-substituted env vars take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Aggressively cache output-hashed static assets
    location ~* \.(js|css|woff2?|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other paths: try static file, fall back to index.html (Angular router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
