    <polygon points="180.88 316.14 0 632.41 209.5 632.41 390.38 316.14"     fill="#F5C200"/>
    <polygon points="600.08 316.31 419.2 632.59 628.7 632.59 809.58 316.31" fill="#4BBDE0"/>
    <polygon points="990.48 0 809.58 316.31 1019.1 316.31 1200 0"           fill="#00BBA8"/>
  </g>
